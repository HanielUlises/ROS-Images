# ============================================================
# ROS2 Humble + Ignition Gazebo — Intel iGPU (ThinkPad X1)
# ============================================================

services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-humble-intel:latest
    container_name: ros2_humble_gazebo

    devices:
      - /dev/dri:/dev/dri 

    group_add:
      - video
      - render 

    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      # Intel / Mesa
      - LIBGL_ALWAYS_SOFTWARE=0
      - MESA_GL_VERSION_OVERRIDE=4.5
      - MESA_GLSL_VERSION_OVERRIDE=450
      - GALLIUM_DRIVER=iris
      - LIBVA_DRIVER_NAME=iHD
      # Gazebo
      - IGN_GAZEBO_RENDER_ENGINE=ogre2
      - IGN_GAZEBO_RESOURCE_PATH=/usr/share/ignition
      # Qt (Gazebo GUI)
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-~/.Xauthority}:/tmp/.Xauthority:ro
      - ./ros2_ws:/ros2_ws/src:rw
      - gazebo_humble_cache:/root/.ignition

    network_mode: host
    ipc: host

    stdin_open: true
    tty: true
    command: bash

volumes:
  gazebo_humble_cache: